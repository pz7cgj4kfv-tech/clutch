<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clutch — Convergence</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0b0610;font-family:-apple-system,Inter,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
  .phone{position:relative;width:380px;height:780px;background:radial-gradient(120% 90% at 50% 38%,#1a0f1e 0%,#0b0610 70%);border-radius:42px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);margin-top:20px}
  canvas{position:absolute;inset:0}
  .top{position:absolute;top:54px;left:0;right:0;text-align:center;z-index:2}
  .top .lbl{color:#8a7d86;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  .top .name{color:#fff;font-size:22px;font-weight:800;margin-top:4px}
  .bot{position:absolute;bottom:48px;left:0;right:0;text-align:center;z-index:2}
  .bot .time{color:#fff;font-size:54px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .bot .sub{color:#9a8d96;font-size:14px;margin-top:8px;font-weight:600}
  .bot .sub b{color:#77BC1F}
  .ctrl{margin-top:18px;width:380px;color:#aaa;font-size:13px;text-align:center}
  .ctrl input{width:80%}
  .ctrl button{background:#532943;color:#fff;border:none;border-radius:10px;padding:8px 16px;font:inherit;font-weight:700;cursor:pointer;margin-top:8px}
</style></head><body>
<div class="phone">
  <canvas id="c"></canvas>
  <div class="top"><div class="lbl">Vous vous rapprochez</div><div class="name">Anaïs</div></div>
  <div class="bot"><div class="time" id="time">12 min</div><div class="sub" id="sub">Rendez-vous au <b>Café du Marché</b></div></div>
</div>
<div class="ctrl">
  <div>Temps avant le RDV (glisse pour voir la convergence) :</div>
  <input id="slider" type="range" min="0" max="1000" value="850">
  <div><button id="play">▶ Rejouer l'approche (auto)</button></div>
</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){ const r=cv.parentElement.getBoundingClientRect(); cv.width=r.width*DPR; cv.height=r.height*DPR; }
resize();
const W=()=>cv.width, H=()=>cv.height;
// progress 0 = loin (bcp de temps), 1 = arrivé (RDV maintenant)
let progress=0.15;
const slider=document.getElementById('slider');
slider.oninput=()=>{ progress=1-slider.value/1000; auto=false; };

// deux nuages : A (rose, c'est l'autre) et B (prune, c'est toi)
const N=90;
function makeCloud(hue){ const p=[]; for(let i=0;i<N;i++){ p.push({a:Math.random()*Math.PI*2, r:0.6+Math.random()*0.55, sz:0.6+Math.random()*2.2, tw:Math.random()*Math.PI*2, sp:0.2+Math.random()*0.8}); } return p; }
const A=makeCloud(), B=makeCloud();

function hex(c){return c}
const ROSE='235,107,175', PLUM='160,90,135', GREEN='119,188,31';

function draw(t){
  ctx.clearRect(0,0,W(),H());
  const cx=W()/2, cy=H()*0.42, base=Math.min(W(),H())*0.36;
  // easing : la convergence s'accélère vers la fin
  const e=progress*progress*(3-2*progress); // smoothstep
  const orbit=base*(1-e*0.86);              // rayon des nuages -> rétrécit vers le centre
  // angle de départ des deux nuages : opposés (PI d'écart) -> convergent vers le même secteur
  const conv=e*Math.PI; // ils se rejoignent
  const angA=-Math.PI/2 - (Math.PI/2) + conv*0.5;
  const angB=-Math.PI/2 + (Math.PI/2) - conv*0.5;

  // étoile verte centrale = LE LIEU
  const pulse=0.5+0.5*Math.sin(t*0.003);
  const gR=10+e*16+pulse*4;
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,gR*4);
  grd.addColorStop(0,`rgba(${GREEN},${0.5+e*0.5})`); grd.addColorStop(0.3,`rgba(${GREEN},${0.25+e*0.3})`); grd.addColorStop(1,'rgba(119,188,31,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,gR*4,0,7); ctx.fill();
  ctx.fillStyle=`rgba(${GREEN},${0.85})`; ctx.beginPath(); ctx.arc(cx,cy,gR*0.6,0,7); ctx.fill();

  function cloud(p,centerAng,color){
    for(const s of p){
      // chaque particule tourne lentement autour de son centre de nuage
      const spin=t*0.0004*s.sp;
      const cloudR=orbit;
      const ccx=cx+Math.cos(centerAng)*cloudR;
      const ccy=cy+Math.sin(centerAng)*cloudR;
      // halo du nuage qui rétrécit avec la convergence
      const spread=(base*0.32)*(1-e*0.7);
      const px=ccx+Math.cos(s.a+spin)*s.r*spread;
      const py=ccy+Math.sin(s.a+spin)*s.r*spread;
      const tw=0.45+0.55*Math.sin(t*0.004*s.sp+s.tw);
      const bright=0.3+e*0.7;
      // couleur vire au vert près du centre
      const dToC=Math.hypot(px-cx,py-cy)/base;
      const g=Math.max(0,1-dToC)*e;
      const col=g>0.4?GREEN:color;
      ctx.fillStyle=`rgba(${col},${tw*bright})`;
      ctx.beginPath(); ctx.arc(px,py,s.sz*(0.8+e*0.6)*DPR,0,7); ctx.fill();
    }
  }
  cloud(A,angA,ROSE);
  cloud(B,angB,PLUM);

  // texte temps
  const minutes=Math.round((1-progress)*0+progress*0+ (1-progress)*60); // 0..60 inversé -> loin=bcp
  const mLeft=Math.max(0,Math.round((1-e)*42)+ (progress<0.02?0:0));
  document.getElementById('time').textContent = e>0.985? 'Vous y êtes ✦' : (mLeft<1?'< 1 min':mLeft+' min');
  document.getElementById('sub').innerHTML = e>0.985? 'Anaïs est <b>au point de rendez-vous</b>' : 'Rendez-vous au <b>Café du Marché</b>';
}
let auto=true, autoT=0;
function loop(t){
  if(auto){ autoT+=0.0022; progress=(Math.sin(autoT-Math.PI/2)+1)/2*0.5+0.08; if(autoT>Math.PI*1.5){autoT=0;} progress=Math.min(1,autoT/ (Math.PI*1.3)); if(autoT>Math.PI*1.3){ progress=1; if(autoT>Math.PI*1.3+1.2){autoT=0;} } slider.value=(1-progress)*1000; }
  draw(t); requestAnimationFrame(loop);
}
document.getElementById('play').onclick=()=>{ auto=true; autoT=0; };
requestAnimationFrame(loop);
window.addEventListener('resize',resize);
</script>
</body></html>
